<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Parko · Vision Test v2</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      :root {
        --bg: #0a0e14;
        --panel: #121821;
        --line: #1f2937;
        --field: #1a222e;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --accent: #22c55e;
        --warn: #f59e0b;
        --danger: #ef4444;
        --blue: #60a5fa;
      }
      html,
      body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        overflow: hidden;
      }
      #app {
        display: flex;
        flex-direction: column;
        height: 100dvh;
      }
      header {
        padding: 9px 14px;
        background: var(--panel);
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      header h1 {
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.3px;
      }
      header h1 span {
        color: var(--accent);
      }
      #status {
        font-size: 11px;
        color: var(--muted);
        text-align: right;
      }
      #stage {
        position: relative;
        flex: 1;
        overflow: hidden;
        background: #000;
        min-height: 0;
      }
      video {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }
      canvas#canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }
      #alert {
        position: absolute;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--danger);
        color: #fff;
        font-weight: 800;
        font-size: 12px;
        padding: 7px 16px;
        border-radius: 999px;
        letter-spacing: 0.5px;
        opacity: 0;
        transition: opacity 0.15s;
        box-shadow: 0 4px 22px rgba(239, 68, 68, 0.55);
      }
      #alert.on {
        opacity: 1;
        animation: pulse 1s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          transform: translateX(-50%) scale(1);
        }
        50% {
          transform: translateX(-50%) scale(1.07);
        }
      }
      #hud {
        position: absolute;
        bottom: 10px;
        left: 10px;
        background: rgba(10, 14, 20, 0.72);
        backdrop-filter: blur(6px);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 7px 11px;
        font-size: 11.5px;
        line-height: 1.55;
      }
      #hud b {
        color: var(--accent);
        font-variant-numeric: tabular-nums;
      }
      #overlayMsg {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 22px;
        background: rgba(10, 14, 20, 0.88);
      }
      #overlayMsg.hidden {
        display: none;
      }
      #overlayMsg .box {
        max-width: 340px;
      }
      #overlayMsg .warn {
        color: var(--warn);
        font-weight: 700;
        margin-bottom: 8px;
        font-size: 15px;
      }
      #overlayMsg p {
        font-size: 13px;
        color: var(--muted);
        line-height: 1.6;
      }

      #tools {
        background: var(--panel);
        border-top: 1px solid var(--line);
        padding: 9px 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      #tools .row {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      #tools input {
        flex: 1;
        min-width: 0;
        padding: 10px;
        background: var(--field);
        border: 1px solid var(--line);
        border-radius: 9px;
        color: var(--text);
        font-size: 12px;
      }
      #tools input::placeholder {
        color: #5b6675;
      }
      #tools .mini {
        flex: 0 0 auto;
        padding: 10px 14px;
        font-size: 13px;
      }
      #plateOut {
        flex: 1;
        font-size: 12.5px;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      #plateOut b {
        color: var(--accent);
        letter-spacing: 1px;
      }
      #plateThumb {
        height: 34px;
        border-radius: 5px;
        border: 1px solid var(--line);
        display: none;
      }
      #tmStatus {
        font-size: 11px;
        color: var(--muted);
      }
      #tmStatus.ready {
        color: var(--accent);
      }

      footer {
        padding: 11px 12px calc(11px + env(safe-area-inset-bottom));
        background: var(--panel);
        border-top: 1px solid var(--line);
        display: flex;
        gap: 9px;
      }
      button {
        border: 1px solid var(--line);
        background: var(--field);
        color: var(--text);
        border-radius: 11px;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.12s,
          background 0.15s;
      }
      footer button {
        flex: 1;
        padding: 13px 6px;
        font-size: 14px;
      }
      button:active {
        transform: scale(0.96);
      }
      button.primary {
        background: var(--accent);
        color: #06210f;
        border-color: var(--accent);
      }
      button.danger {
        background: var(--danger);
        color: #fff;
        border-color: var(--danger);
      }
      button.blue {
        background: var(--blue);
        color: #06203f;
        border-color: var(--blue);
      }
      button:disabled {
        opacity: 0.4;
        cursor: default;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>
          Par<span>ko</span> · Vision Test
          <span style="color: var(--muted); font-weight: 500; font-size: 11px"
            >v2</span
          >
        </h1>
        <div id="status">loading model…</div>
      </header>

      <div id="stage">
        <video id="video" playsinline autoplay muted></video>
        <canvas id="canvas"></canvas>
        <div id="alert">VEHICLE DETECTED</div>
        <div id="hud">
          FPS <b id="fps">0</b><br />
          Vehicles <b id="vcount">0</b> · Objects <b id="ocount">0</b><br />
          Type <b id="vtype">—</b>
        </div>
        <div id="overlayMsg">
          <div class="box">
            <div class="warn" id="warnTitle">Ready to test</div>
            <p id="overlayText">
              "Start" dabao aur camera permission allow karo. Camera ke liye
              page HTTPS pe hosted hona chahiye.
            </p>
          </div>
        </div>
      </div>

      <div id="tools">
        <div class="row">
          <input
            id="tmUrl"
            type="text"
            placeholder="Teachable Machine model URL (.../models/XXXX/)"
            autocapitalize="off"
            autocorrect="off"
            spellcheck="false"
          />
          <button id="loadTm" class="mini">Load</button>
        </div>
        <div class="row">
          <button id="readPlate" class="mini blue" disabled>
            📷 Read Plate
          </button>
          <div id="plateOut">plate: —</div>
          <img id="plateThumb" alt="" />
        </div>
        <div id="tmStatus">
          5/7-seater classifier: off (load a Teachable Machine model)
        </div>
      </div>

      <footer>
        <button id="startBtn" class="primary">Start</button>
        <button id="flipBtn" disabled>Flip</button>
        <button id="soundBtn" disabled>🔇 Sound</button>
      </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script>
      (() => {
        const $ = (id) => document.getElementById(id);
        const stage = $("stage"),
          video = $("video"),
          canvas = $("canvas"),
          ctx = canvas.getContext("2d");
        const statusEl = $("status"),
          fpsEl = $("fps"),
          vcountEl = $("vcount"),
          ocountEl = $("ocount"),
          vtypeEl = $("vtype");
        const alertEl = $("alert"),
          startBtn = $("startBtn"),
          flipBtn = $("flipBtn"),
          soundBtn = $("soundBtn");
        const overlayMsg = $("overlayMsg"),
          overlayText = $("overlayText"),
          warnTitle = $("warnTitle");
        const tmUrl = $("tmUrl"),
          loadTm = $("loadTm"),
          tmStatus = $("tmStatus");
        const readPlate = $("readPlate"),
          plateOut = $("plateOut"),
          plateThumb = $("plateThumb");

        const VEHICLES = new Set([
          "car",
          "truck",
          "bus",
          "motorcycle",
          "bicycle",
        ]);
        const THRESH = 0.55;

        let model = null,
          tmModel = null,
          tWorker = null;
        let stream = null,
          running = false,
          facing = "environment";
        let soundOn = false,
          audioCtx = null,
          lastBeep = 0,
          prevVehicles = 0;
        let frames = 0,
          lastFpsT = performance.now(),
          frameCount = 0;
        let lastPreds = [],
          vehicleLabel = "";

        if (!window.isSecureContext) {
          warnTitle.textContent = "⚠️ HTTPS chahiye";
          overlayText.textContent =
            "Camera tabhi chalega jab page HTTPS pe ho. GitHub Pages / Netlify pe host karke kholo. file:// pe camera block rehta hai.";
        }

        cocoSsd
          .load()
          .then((m) => {
            model = m;
            statusEl.textContent = "detector ready";
          })
          .catch((e) => {
            statusEl.textContent = "detector load failed";
            console.error(e);
          });

        // ---------- camera ----------
        function resizeCanvas() {
          const r = stage.getBoundingClientRect();
          canvas.width = Math.round(r.width);
          canvas.height = Math.round(r.height);
        }
        video.addEventListener("loadedmetadata", resizeCanvas);
        window.addEventListener("resize", resizeCanvas);
        window.addEventListener("orientationchange", () =>
          setTimeout(resizeCanvas, 300),
        );

        async function startCamera() {
          if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            overlayMsg.classList.remove("hidden");
            overlayText.textContent =
              "Is browser mein camera API support nahi hai.";
            return;
          }
          try {
            if (stream) stream.getTracks().forEach((t) => t.stop());
            stream = await navigator.mediaDevices.getUserMedia({
              video: {
                facingMode: { ideal: facing },
                width: { ideal: 1280 },
                height: { ideal: 720 },
              },
              audio: false,
            });
            video.srcObject = stream;
            await video.play();
            overlayMsg.classList.add("hidden");
            flipBtn.disabled = false;
            soundBtn.disabled = false;
            readPlate.disabled = false;
            startBtn.textContent = "Stop";
            startBtn.classList.remove("primary");
            startBtn.classList.add("danger");
            running = true;
            resizeCanvas();
            loop();
          } catch (e) {
            overlayMsg.classList.remove("hidden");
            warnTitle.textContent = "Camera nahi mila";
            overlayText.textContent =
              e.message + " — permission allow karo / HTTPS pe kholo.";
            console.error(e);
          }
        }
        function stopCamera() {
          running = false;
          if (stream) stream.getTracks().forEach((t) => t.stop());
          stream = null;
          video.srcObject = null;
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          startBtn.textContent = "Start";
          startBtn.classList.add("primary");
          startBtn.classList.remove("danger");
          flipBtn.disabled = true;
          soundBtn.disabled = true;
          readPlate.disabled = true;
          alertEl.classList.remove("on");
          vcountEl.textContent = "0";
          ocountEl.textContent = "0";
          fpsEl.textContent = "0";
          vtypeEl.textContent = "—";
          overlayMsg.classList.remove("hidden");
          warnTitle.textContent = "Stopped";
          overlayText.textContent = 'Dobara test karne ke liye "Start" dabao.';
        }

        // ---------- helpers ----------
        function largestVehicle(preds) {
          let best = null,
            area = 0;
          preds.forEach((p) => {
            if (VEHICLES.has(p.class)) {
              const a = p.bbox[2] * p.bbox[3];
              if (a > area) {
                area = a;
                best = p;
              }
            }
          });
          return best;
        }
        function cropCanvas(bbox, outW, outH, startFrac) {
          let [x, y, w, h] = bbox;
          if (startFrac) {
            y = y + h * startFrac;
            h = h * (1 - startFrac);
          }
          x = Math.max(0, x);
          y = Math.max(0, y);
          w = Math.min(w, video.videoWidth - x);
          h = Math.min(h, video.videoHeight - y);
          const c = document.createElement("canvas");
          c.width = outW;
          c.height = outH;
          c.getContext("2d").drawImage(video, x, y, w, h, 0, 0, outW, outH);
          return c;
        }
        function binarize(c) {
          const cc = c.getContext("2d");
          const im = cc.getImageData(0, 0, c.width, c.height);
          const d = im.data;
          let lo = 255, hi = 0;
          const g = new Float32Array(d.length / 4);
          for (let i = 0, j = 0; i < d.length; i += 4, j++) {
            const v = 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];
            g[j] = v;
            if (v < lo) lo = v;
            if (v > hi) hi = v;
          }
          // contrast-stretch threshold: midpoint between darkest and brightest pixel
          const thresh = (lo + hi) / 2;
          for (let i = 0, j = 0; i < d.length; i += 4, j++) {
            const v = g[j] >= thresh ? 255 : 0;
            d[i] = d[i + 1] = d[i + 2] = v;
            d[i + 3] = 255;
          }
          cc.putImageData(im, 0, 0);
          return c;
        }
        function beep() {
          if (!soundOn) return;
          const now = performance.now();
          if (now - lastBeep < 1500) return;
          lastBeep = now;
          try {
            audioCtx =
              audioCtx ||
              new (window.AudioContext || window.webkitAudioContext)();
            const o = audioCtx.createOscillator(),
              gg = audioCtx.createGain();
            o.type = "sine";
            o.frequency.value = 880;
            gg.gain.setValueAtTime(0.0001, audioCtx.currentTime);
            gg.gain.exponentialRampToValueAtTime(
              0.3,
              audioCtx.currentTime + 0.02,
            );
            gg.gain.exponentialRampToValueAtTime(
              0.0001,
              audioCtx.currentTime + 0.25,
            );
            o.connect(gg);
            gg.connect(audioCtx.destination);
            o.start();
            o.stop(audioCtx.currentTime + 0.26);
          } catch (e) {}
        }

        // ---------- detection loop ----------
        async function loop() {
          if (!running) return;
          if (!model) {
            requestAnimationFrame(loop);
            return;
          }
          let preds = [];
          try {
            preds = await model.detect(video);
          } catch (e) {}
          preds = preds.filter((p) => p.score >= THRESH);
          lastPreds = preds;

          const vehicles = preds.filter((p) => VEHICLES.has(p.class));
          vcountEl.textContent = vehicles.length;
          ocountEl.textContent = preds.length;
          if (vehicles.length > 0) {
            alertEl.classList.add("on");
            if (prevVehicles === 0) beep();
          } else {
            alertEl.classList.remove("on");
          }
          prevVehicles = vehicles.length;

          // 5/7-seater classify on the nearest (largest) vehicle, throttled
          frameCount++;
          if (tmModel && frameCount % 5 === 0) {
            const big = largestVehicle(preds);
            if (big) {
              try {
                const p = await tmModel.predict(
                  cropCanvas(big.bbox, 224, 224, false),
                );
                p.sort((a, b) => b.probability - a.probability);
                vehicleLabel = `${p[0].className} ${(p[0].probability * 100) | 0}%`;
                vtypeEl.textContent = vehicleLabel;
              } catch (e) {}
            } else {
              vehicleLabel = "";
              vtypeEl.textContent = "—";
            }
          }

          draw(preds);
          frames++;
          const t = performance.now();
          if (t - lastFpsT >= 1000) {
            fpsEl.textContent = frames;
            frames = 0;
            lastFpsT = t;
          }
          requestAnimationFrame(loop);
        }

        function draw(preds) {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          const vw = video.videoWidth,
            vh = video.videoHeight;
          if (!vw || !vh) return;
          const scale = Math.min(canvas.width / vw, canvas.height / vh);
          const dw = vw * scale,
            dh = vh * scale,
            ox = (canvas.width - dw) / 2,
            oy = (canvas.height - dh) / 2;
          const fs = Math.max(13, canvas.width / 40);
          ctx.lineWidth = Math.max(2, canvas.width / 260);
          ctx.textBaseline = "top";
          const big = largestVehicle(preds);
          preds.forEach((p) => {
            const isV = VEHICLES.has(p.class);
            const color = isV ? "#22c55e" : "#60a5fa";
            const X = p.bbox[0] * scale + ox,
              Y = p.bbox[1] * scale + oy,
              W = p.bbox[2] * scale,
              H = p.bbox[3] * scale;
            ctx.strokeStyle = color;
            ctx.strokeRect(X, Y, W, H);
            let label = `${p.class} ${(p.score * 100) | 0}%`;
            if (p === big && vehicleLabel) label += ` · ${vehicleLabel}`;
            ctx.font = `600 ${fs}px -apple-system,sans-serif`;
            const tw = ctx.measureText(label).width,
              th = fs + 8,
              ly = Y > th ? Y - th : Y;
            ctx.fillStyle = color;
            ctx.fillRect(X, ly, tw + 10, th);
            ctx.fillStyle = isV ? "#06210f" : "#06203f";
            ctx.fillText(label, X + 5, ly + 4);
          });
        }

        // ---------- Teachable Machine (5/7-seater) ----------
        loadTm.addEventListener("click", async () => {
          let base = tmUrl.value.trim();
          if (!base) {
            tmStatus.textContent =
              "paste your Teachable Machine model URL first";
            return;
          }
          if (!base.endsWith("/")) base += "/";
          tmStatus.classList.remove("ready");
          tmStatus.textContent = "loading classifier…";
          loadTm.disabled = true;
          try {
            tmModel = await tmImage.load(
              base + "model.json",
              base + "metadata.json",
            );
            tmStatus.classList.add("ready");
            tmStatus.textContent =
              "classifier ready ✓ (classifying nearest vehicle)";
          } catch (e) {
            tmStatus.textContent = "classifier load failed — check the URL";
            console.error(e);
          }
          loadTm.disabled = false;
        });

        // ---------- License plate OCR (on-demand) ----------
        async function getWorker() {
          if (tWorker) return tWorker;
          tWorker = await Tesseract.createWorker("eng");
          await tWorker.setParameters({
            tessedit_char_whitelist: "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789",
            tessedit_pageseg_mode: "13", // raw line — best for license plates
          });
          return tWorker;
        }
        readPlate.addEventListener("click", async () => {
          if (!running) return;
          readPlate.disabled = true;
          const orig = readPlate.textContent;
          readPlate.textContent = "reading…";
          plateOut.innerHTML = "plate: scanning…";
          try {
            const big = largestVehicle(lastPreds);
            const bbox = big
              ? big.bbox
              : [video.videoWidth * 0.1, video.videoHeight * 0.3,
                 video.videoWidth * 0.8, video.videoHeight * 0.4];

            // Try 3 crop regions: bottom 35%, 40%, 45% of vehicle bbox
            const fracs = big ? [0.65, 0.60, 0.55] : [undefined];

            // Show the tightest crop as thumbnail
            const thumb = cropCanvas(bbox, 800, 200, fracs[0]);
            plateThumb.src = thumb.toDataURL();
            plateThumb.style.display = "block";

            const w = await getWorker();
            let bestText = "";

            for (const frac of fracs) {
              const raw = cropCanvas(bbox, 800, 200, frac);
              // binarized copy
              const bin = document.createElement("canvas");
              bin.width = raw.width; bin.height = raw.height;
              bin.getContext("2d").drawImage(raw, 0, 0);
              binarize(bin);

              for (const src of [bin, raw]) {
                try {
                  const { data } = await w.recognize(src);
                  const text = (data.text || "").replace(/[^A-Z0-9]/gi, "").toUpperCase();
                  if (text.length > bestText.length) bestText = text;
                } catch (e) {}
              }

              // Stop early if we already have a plausible plate (≥6 chars)
              if (bestText.length >= 6) break;
            }

            plateOut.innerHTML = bestText
              ? `plate: <b>${bestText}</b>`
              : "plate: (kuch nahi mila — plate ko frame mein bada/seedha rakho)";
          } catch (e) {
            plateOut.textContent = "plate: OCR error";
            console.error(e);
          }
          readPlate.textContent = orig;
          readPlate.disabled = false;
        });

        // ---------- controls ----------
        startBtn.addEventListener("click", () =>
          running ? stopCamera() : startCamera(),
        );
        flipBtn.addEventListener("click", async () => {
          facing = facing === "environment" ? "user" : "environment";
          if (running) await startCamera();
        });
        soundBtn.addEventListener("click", () => {
          soundOn = !soundOn;
          soundBtn.textContent = soundOn ? "🔊 Sound" : "🔇 Sound";
          if (soundOn) {
            try {
              audioCtx =
                audioCtx ||
                new (window.AudioContext || window.webkitAudioContext)();
              audioCtx.resume();
            } catch (e) {}
          }
        });
      })();
    </script>
  </body>
</html>
